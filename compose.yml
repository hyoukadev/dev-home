services:
  dev-home:
    image: ${DEV_HOME_IMAGE:-dev-home}
    build:
      context: .
    container_name: dev-home
    network_mode: host
    userns_mode: keep-id
    working_dir: /home/dev
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file:
      - .env
      - .env.secret
    environment:
      DEV_HOME_WORKSPACE: /workspace
      DEV_HOME_KEEP_GROUPS: ${DEV_HOME_KEEP_GROUPS:-0}
    group_add:
      - keep-groups
    security_opt:
      - label=disable
    devices:
      - ${DEV_HOME_DRI_DEVICE:-/dev/null:/dev/null}
      - ${DEV_HOME_KFD_DEVICE:-/dev/zero:/dev/zero}
      - ${DEV_HOME_GPU_CDI_DEVICE:-/dev/full:/dev/full}
    volumes:
      - dev-home-home:/home/dev
      - ${DEV_HOME_HOST_WORKSPACE:-..}:/workspace
      - ~/.ssh:/host-ssh:ro

volumes:
  dev-home-home:
